services:
  init-clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    restart: on-failure
    container_name: signoz-init-clickhouse
    networks:
      - clickhouse-network
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    volumes:
      - ./data/user_scripts:/var/lib/clickhouse/user_scripts/
    logging:
      options:
        max-size: 50m
        max-file: "3"

  zookeeper-1:
    image: signoz/zookeeper:3.7.1
    restart: unless-stopped
    user: root
    container_name: signoz-zookeeper-1
    networks:
      - clickhouse-network
    labels:
      signoz.io/scrape: "true"
      signoz.io/port: "9141"
      signoz.io/path: "/metrics"
    volumes:
      - zookeeper-1:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
    ports:
      - "9141:9141"
    logging:
      options:
        max-size: 50m
        max-file: "3"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null
      interval: 30s
      timeout: 5s
      retries: 3

  clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    restart: unless-stopped
    container_name: clickhouse
    networks:
      - clickhouse-network
    ports:
      - "8123:8123"
      - "9000:9000"
      - "9363:9363"
    tty: true
    labels:
      signoz.io/scrape: "true"
      signoz.io/port: "9363"
      signoz.io/path: "/metrics"
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    volumes:
      - ./config/config.xml:/etc/clickhouse-server/config.xml
      - ./config/users.xml:/etc/clickhouse-server/users.xml
      - ./config/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./data/user_scripts:/var/lib/clickhouse/user_scripts/
      - ./config/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - clickhouse:/var/lib/clickhouse/
    logging:
      options:
        max-size: 50m
        max-file: "3"
    depends_on:
      init-clickhouse:
        condition: service_completed_successfully
      zookeeper-1:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - 127.0.0.1:8123/ping
      interval: 30s
      timeout: 5s
      retries: 3
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144

  signoz-telemetrystore-migrator:
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.144.1}
    restart: on-failure
    container_name: signoz-telemetrystore-migrator
    networks:
      - clickhouse-network
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    logging:
      options:
        max-size: 50m
        max-file: "3"
    depends_on:
      clickhouse:
        condition: service_healthy

networks:
  clickhouse-network:
    driver: bridge

volumes:
  clickhouse:
    name: clickhouse
  zookeeper-1:
    name: stand-signoz-zookeeper-1